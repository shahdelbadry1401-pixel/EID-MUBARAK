<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balloon Celebration</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-frame">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Eid Adha Mubarak</span>
    </div>
    <nav class="icon-bar">
      <a href="mosque.html" class="icon-slot" aria-label="Mosque page">
        <img src="mosque2.png" alt="Mosque icon" />
      </a>
      <a href="balloons.html" class="icon-slot" aria-label="Balloons page">
        <img src="balloons2.png" alt="Balloons icon" />
      </a>
      <a href="sheep.html" class="icon-slot" aria-label="Sheep page">
        <img src="sheep-3dya.webp" alt="Sheep icon" />
      </a>
    </nav>
  </header>
  <main class="page-content">
    
  </main>
  <!-- Score box (top-right like balance) -->
  <div id="balloon-score" class="reveal-button score-box" style="display: none;">Score:0</div>

  <!-- Click on ballons instruction text (lower part) -->
  <div id="balloons-instruction" class="balloons-instruction">click on ballons!</div>

  <div id="spot-layer" class="spot-layer" aria-hidden="true"></div>
   <div id="balloon-stage" class="balloon-stage" aria-hidden="true"></div>
  <!-- Eid image container (same animation as Mosque page) -->
  <div id="eid-container" class="eid-container" aria-hidden="true">
    <img id="eid-image" src="eid-color.webp" alt="Eid Mubarak" class="eid-image" />
  </div>
  <script src="script.js"></script>
</body>
</html>
